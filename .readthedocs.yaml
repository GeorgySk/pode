version: "2"

build:
  os: "ubuntu-24.04"
  tools:
    python: "3.14"
  # Based on https://docs.readthedocs.com/platform/stable/build-customization.html#install-dependencies-with-poetry
  jobs:
    post_install:
      - pip install poetry
      - VIRTUAL_ENV=$READTHEDOCS_VIRTUALENV_PATH poetry install --with docs

sphinx:
  configuration: docs/source/conf.py
